const ALL_ITEMS=Object.values(LEVEL_DATA).flat();
for(let i=11;i<=20;i++)LEVEL_DATA[i]=null;
const LEVEL_LABELS={1:"Level 1 — Regular verbs",2:"Level 2 — Irregular verbs",3:"Level 3 — Wishes & desires",4:"Level 4 — Doubt & denial",5:"Level 5 — Emotions",6:"Level 6 — Impersonal phrases",7:"Level 7 — Conjunctions",8:"Level 8 — Imperfect subjunctive",9:"Level 9 — If-clauses",10:"Level 10 — Time clauses",11:"Level 11 — Mixed",12:"Level 12 — Mixed",13:"Level 13 — Mixed",14:"Level 14 — Mixed",15:"Level 15 — Mixed",16:"Level 16 — Mixed",17:"Level 17 — Mixed",18:"Level 18 — Mixed",19:"Level 19 — Mixed",20:"Level 20 — FULL MIX 🔥"};
let currentLevel=1,unlockedLevels=1,gameVerbs=[],startTime,timerInterval;
const levelList=document.getElementById("level-list"),gameContainer=document.getElementById("game"),questionsContainer=document.getElementById("questions"),resultsContainer=document.getElementById("results");
renderLevels();
function renderLevels(){levelList.style.display="flex";gameContainer.style.display="none";levelList.innerHTML="";for(let i=1;i<=20;i++){const btn=document.createElement("button");const best=localStorage.getItem(`bestTime_Subjunctive_Level${i}`);const locked=i>unlockedLevels;btn.textContent=locked?`${LEVEL_LABELS[i]} 🔒`:`${LEVEL_LABELS[i]}${best?`  ·  Best: ${best}s`:""}`;btn.disabled=locked;btn.addEventListener("click",()=>startGame(i));levelList.appendChild(btn);}}
function startGame(level){currentLevel=level;const pool=shuffleArray(LEVEL_DATA[level]?[...LEVEL_DATA[level]]:[...ALL_ITEMS]);gameVerbs=pool.slice(0,10);levelList.style.display="none";gameContainer.style.display="block";questionsContainer.innerHTML="";resultsContainer.innerHTML="";gameVerbs.forEach(item=>{const div=document.createElement("div");div.className="question-block";div.innerHTML=`<span class="trigger-label">${item.trigger}</span><strong>${item.en}</strong><input type="text" data-answer="${item.es}" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="type in Spanish…">`;questionsContainer.appendChild(div);});const inputs=questionsContainer.querySelectorAll("input");inputs.forEach((input,idx)=>{input.addEventListener("keydown",e=>{if(e.key==="Enter"){if(idx<inputs.length-1)inputs[idx+1].focus();else document.getElementById("submit").click();}});});if(inputs[0])inputs[0].focus();startTimer();}
function shuffleArray(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
function startTimer(){startTime=Date.now();timerInterval=setInterval(()=>{document.getElementById("timer").textContent=`Time: ${Math.floor((Date.now()-startTime)/1000)}s`;},1000);}
function stopTimer(){clearInterval(timerInterval);}
const normalize=s=>s.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
document.getElementById("submit").addEventListener("click",()=>{stopTimer();const elapsed=Math.floor((Date.now()-startTime)/1000);let penalty=0,correct=0;document.querySelectorAll("#questions input").forEach(input=>{if(normalize(input.value)===normalize(input.dataset.answer)){correct++;input.style.border="2.5px solid #27ae60";input.style.background="#f0fff6";}else{penalty+=30;input.style.border="2.5px solid #e74c3c";input.style.background="#fff5f5";input.style.animation="shake 0.4s ease";}});const totalTime=elapsed+penalty;resultsContainer.innerHTML=`<h3>Game Over!</h3><p>Correct: <strong>${correct}/10</strong></p><p>Time: ${elapsed}s + Penalty: ${penalty}s = <strong>${totalTime}s</strong></p><h4>Feedback:</h4>`;document.querySelectorAll("#questions input").forEach(input=>{if(normalize(input.value)!==normalize(input.dataset.answer)){const p=document.createElement("p");p.innerHTML=`<strong>${input.closest(".question-block").querySelector("strong").textContent}</strong> → Correct: <span style="color:#27ae60;font-weight:800">${input.dataset.answer}</span> | Yours: <span style="color:#e74c3c;font-weight:700">${input.value.trim()||"(blank)"}</span>`;resultsContainer.appendChild(p);}});const bestKey=`bestTime_Subjunctive_Level${currentLevel}`;const saved=localStorage.getItem(bestKey);if(!saved||totalTime<parseInt(saved))localStorage.setItem(bestKey,totalTime);if(totalTime<=levelUnlockTime(currentLevel)&&unlockedLevels<currentLevel+1&&currentLevel<20){unlockedLevels=currentLevel+1;const u=document.createElement("p");u.style.color="#2471a3";u.style.fontWeight="800";u.style.fontSize="1.2rem";u.innerHTML=`🔓 <strong>${LEVEL_LABELS[currentLevel+1]} Unlocked!</strong>`;resultsContainer.appendChild(u);}if(correct===10){const cel=document.createElement("div");cel.className="perfect-celebration";cel.textContent="🎉 PERFECT GAME! 🎉";resultsContainer.prepend(cel);setTimeout(()=>cel.remove(),5000);}const tryBtn=document.createElement("button");tryBtn.textContent="Try Again";tryBtn.className="try-again";tryBtn.onclick=()=>startGame(currentLevel);resultsContainer.appendChild(tryBtn);const backBtn=document.createElement("button");backBtn.textContent="Back to Levels";backBtn.id="back-button";backBtn.onclick=()=>renderLevels();resultsContainer.appendChild(backBtn);});
function levelUnlockTime(level){return 200+(level-1)*10;}
  </script>
</body>
</html>
